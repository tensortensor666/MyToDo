name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v1.0.1'
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

      - name: Validate Android signing secrets
        shell: bash
        env:
          MYTODO_ANDROID_KEYSTORE_BASE64: ${{ secrets.MYTODO_ANDROID_KEYSTORE_BASE64 }}
          MYTODO_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.MYTODO_ANDROID_KEYSTORE_PASSWORD }}
          MYTODO_ANDROID_KEY_ALIAS: ${{ secrets.MYTODO_ANDROID_KEY_ALIAS }}
          MYTODO_ANDROID_KEY_PASSWORD: ${{ secrets.MYTODO_ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$MYTODO_ANDROID_KEYSTORE_BASE64"
          test -n "$MYTODO_ANDROID_KEYSTORE_PASSWORD"
          test -n "$MYTODO_ANDROID_KEY_ALIAS"
          test -n "$MYTODO_ANDROID_KEY_PASSWORD"
          echo "$MYTODO_ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/mytodo-release.jks
          cat > android/key.properties <<EOF
          storeFile=app/mytodo-release.jks
          storePassword=$MYTODO_ANDROID_KEYSTORE_PASSWORD
          keyAlias=$MYTODO_ANDROID_KEY_ALIAS
          keyPassword=$MYTODO_ANDROID_KEY_PASSWORD
          EOF
          keytool -list \
            -keystore android/app/mytodo-release.jks \
            -storepass "$MYTODO_ANDROID_KEYSTORE_PASSWORD" \
            -alias "$MYTODO_ANDROID_KEY_ALIAS" \
            >/dev/null

      - name: Build split APKs
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/symbols/android

      - name: Prepare Android artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "dist/MyTodo-${version}-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "dist/MyTodo-${version}-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk "dist/MyTodo-${version}-x86_64.apk"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: dist/*.apk
          if-no-files-found: error

  windows:
    name: Windows App
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Prepare Windows artifacts
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG -replace '^v', ''
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath "dist\MyTodo-$version-windows-x64.zip" -Force
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc installer\windows\MyTodo.iss "/DMyAppVersion=$version"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            dist/*.zip
            dist/*setup.exe
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - android
      - windows

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: MyTodo ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
